name: Build and Deploy to EKS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/01-food-delivery-eks-platform/services/**"
      - "projects/01-food-delivery-eks-platform/tests/**"
      - "projects/01-food-delivery-eks-platform/k8s/**"
      - "projects/01-food-delivery-eks-platform/infra/**"
      - "projects/01-food-delivery-eks-platform/scripts/**"
      - "projects/01-food-delivery-eks-platform/docker-compose.yml"
      - "projects/01-food-delivery-eks-platform/pytest.ini"

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: food-delivery-dev
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  setup-cluster:
    name: Apply Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply namespace and configmap
        run: |
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/namespace.yaml
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/configmap.yaml

      - name: Apply service manifests
        run: |
          for SVC in user-service restaurant-service order-service delivery-service; do
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-deployment.yaml
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-service.yaml
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-hpa.yaml
          done
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/frontend-deployment.yaml
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/frontend-service.yaml

      - name: Install ingress-nginx controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.service.type=LoadBalancer \
            --wait \
            --timeout 10m

      - name: Apply ingress
        run: |
          kubectl delete ingress food-delivery-ingress -n food-delivery --ignore-not-found=true
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/ingress/ingress.yaml

      - name: Show app URL
        run: |
          echo "Waiting for ingress-nginx LoadBalancer hostname..."
          for i in {1..30}; do
            APP_HOST=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "${APP_HOST}" ]; then
              echo "App URL: http://${APP_HOST}"
              exit 0
            fi
            sleep 10
          done
          kubectl get svc ingress-nginx-controller -n ingress-nginx
          echo "LoadBalancer hostname was not ready in time."
          exit 1

      - name: Install kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          helm uninstall kube-prometheus-stack --namespace monitoring 2>/dev/null || true
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/monitoring/grafana-dashboards-configmap.yaml
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --values projects/01-food-delivery-eks-platform/k8s/monitoring/prometheus-values.yaml \
            --set prometheusOperator.admissionWebhooks.enabled=false \
            --set prometheusOperator.admissionWebhooks.patch.enabled=false \
            --set prometheusOperator.tls.enabled=false \
            --timeout 10m
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/monitoring/grafana-service.yaml

  build-and-deploy:
    name: Build and Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup-cluster
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: services/user-service
          - service: restaurant-service
            context: services/restaurant-service
          - service: order-service
            context: services/order-service
          - service: delivery-service
            context: services/delivery-service
          - service: frontend
            context: services/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}"

          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" \
                       -t "${IMAGE_URI}:latest" \
                       ./projects/01-food-delivery-eks-platform/${{ matrix.context }}

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}:${IMAGE_TAG}"

          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}="${IMAGE_URI}" \
            -n food-delivery

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ matrix.service }} \
            -n food-delivery \
            --timeout=300s

      - name: Job summary
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ matrix.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${IMAGE_TAG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed successfully |" >> $GITHUB_STEP_SUMMARY
