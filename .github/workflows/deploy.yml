name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: food-delivery-dev
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  setup-cluster:
    name: Apply Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply namespace and configmap
        run: |
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/namespace.yaml
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/configmap.yaml

      - name: Apply service manifests
        run: |
          for SVC in user-service restaurant-service order-service delivery-service; do
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-deployment.yaml
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-service.yaml
            kubectl apply -f projects/01-food-delivery-eks-platform/k8s/${SVC}-hpa.yaml
          done

      - name: Apply ingress
        run: |
          kubectl apply -f projects/01-food-delivery-eks-platform/k8s/ingress/ingress.yaml

  build-and-deploy:
    name: Build and Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup-cluster
    strategy:
      matrix:
        include:
          - service: user-service
            port: 8001
          - service: restaurant-service
            port: 8002
          - service: order-service
            port: 8003
          - service: delivery-service
            port: 8004

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}"

          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" \
                       -t "${IMAGE_URI}:latest" \
                       ./projects/01-food-delivery-eks-platform/services/${{ matrix.service }}

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}:${IMAGE_TAG}"

          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}="${IMAGE_URI}" \
            -n food-delivery

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ matrix.service }} \
            -n food-delivery \
            --timeout=300s

      - name: Job summary
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ matrix.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${IMAGE_TAG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed successfully |" >> $GITHUB_STEP_SUMMARY
