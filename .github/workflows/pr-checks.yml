name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint user-service
        run: flake8 projects/01-food-delivery-eks-platform/services/user-service/ --max-line-length=120 --exclude=__pycache__

      - name: Lint restaurant-service
        run: flake8 projects/01-food-delivery-eks-platform/services/restaurant-service/ --max-line-length=120 --exclude=__pycache__

      - name: Lint order-service
        run: flake8 projects/01-food-delivery-eks-platform/services/order-service/ --max-line-length=120 --exclude=__pycache__

      - name: Lint delivery-service
        run: flake8 projects/01-food-delivery-eks-platform/services/delivery-service/ --max-line-length=120 --exclude=__pycache__

  test:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Install service dependencies
        run: |
          pip install fastapi uvicorn pydantic python-jose passlib bcrypt aiosqlite \
                      httpx prometheus-fastapi-instrumentator prometheus-client python-multipart

      - name: Run tests
        env:
          USER_SERVICE_URL: ""
          RESTAURANT_SERVICE_URL: ""
          ORDER_SERVICE_URL: ""
          DELIVERY_SERVICE_URL: ""
        run: |
          pytest projects/01-food-delivery-eks-platform/tests/ -v --tb=short

  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive projects/01-food-delivery-eks-platform/infra/terraform/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init (modules only)
        working-directory: projects/01-food-delivery-eks-platform/infra/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: projects/01-food-delivery-eks-platform/infra/terraform
        run: terraform validate
