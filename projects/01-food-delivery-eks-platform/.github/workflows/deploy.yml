name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: food-delivery-dev
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      user-service: ${{ steps.changes.outputs.user-service }}
      restaurant-service: ${{ steps.changes.outputs.restaurant-service }}
      order-service: ${{ steps.changes.outputs.order-service }}
      delivery-service: ${{ steps.changes.outputs.delivery-service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          echo "user-service=$(git diff --name-only HEAD~1 HEAD | grep -q 'services/user-service' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "restaurant-service=$(git diff --name-only HEAD~1 HEAD | grep -q 'services/restaurant-service' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "order-service=$(git diff --name-only HEAD~1 HEAD | grep -q 'services/order-service' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "delivery-service=$(git diff --name-only HEAD~1 HEAD | grep -q 'services/delivery-service' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build and Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: user-service
            changed: ${{ needs.detect-changes.outputs.user-service }}
            port: 8001
          - service: restaurant-service
            changed: ${{ needs.detect-changes.outputs.restaurant-service }}
            port: 8002
          - service: order-service
            changed: ${{ needs.detect-changes.outputs.order-service }}
            port: 8003
          - service: delivery-service
            changed: ${{ needs.detect-changes.outputs.delivery-service }}
            port: 8004
    if: ${{ matrix.changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}"

          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" \
                       -t "${IMAGE_URI}:latest" \
                       ./services/${{ matrix.service }}

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image=${IMAGE_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Built and pushed ${IMAGE_URI}:${IMAGE_TAG}"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/food-delivery/${{ matrix.service }}:${IMAGE_TAG}"

          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}="${IMAGE_URI}" \
            -n food-delivery

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ matrix.service }} \
            -n food-delivery \
            --timeout=300s

      - name: Smoke test
        run: |
          LB_HOST=$(kubectl get ingress food-delivery-ingress -n food-delivery \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          SERVICE=${{ matrix.service }}
          PATH_PREFIX=$(echo $SERVICE | sed 's/-service//')

          echo "Smoke testing http://${LB_HOST}/api/${PATH_PREFIX}s/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${LB_HOST}/api/${PATH_PREFIX}s/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for ${{ matrix.service }}"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done

      - name: Job summary
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ matrix.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${IMAGE_TAG} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed successfully |" >> $GITHUB_STEP_SUMMARY
