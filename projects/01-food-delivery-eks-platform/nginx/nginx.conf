worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main_with_time '$remote_addr - $remote_user [$time_local] "$request" '
                               '$status $body_bytes_sent "$http_referer" '
                               '"$http_user_agent" rt=$request_time '
                               'uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main_with_time;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    upstream user_service {
        server user-service:8001;
    }

    upstream restaurant_service {
        server restaurant-service:8002;
    }

    upstream order_service {
        server order-service:8003;
    }

    upstream delivery_service {
        server delivery-service:8004;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/users {
            proxy_pass http://user_service;
            rewrite ^/api/users(/.*)$ /users$1 break;
            rewrite ^/api/users$ /users break;
        }

        location /api/restaurants {
            proxy_pass http://restaurant_service;
            rewrite ^/api/restaurants(/.*)$ /restaurants$1 break;
            rewrite ^/api/restaurants$ /restaurants break;
        }

        location /api/orders {
            proxy_pass http://order_service;
            rewrite ^/api/orders(/.*)$ /orders$1 break;
            rewrite ^/api/orders$ /orders break;
        }

        location /api/delivery {
            proxy_pass http://delivery_service;
            rewrite ^/api/delivery(/.*)$ /delivery$1 break;
            rewrite ^/api/delivery$ /delivery break;
        }

        location / {
            proxy_pass http://frontend;
        }
    }
}
