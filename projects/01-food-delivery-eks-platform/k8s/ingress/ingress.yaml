apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-delivery-users-ingress
  namespace: food-delivery
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /users/$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 8001
---
