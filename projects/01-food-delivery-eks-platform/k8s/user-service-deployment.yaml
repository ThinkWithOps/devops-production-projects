apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: food-delivery
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/version: "1.0.0"
    spec:
      containers:
        - name: user-service
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/food-delivery/user-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: JWT_SECRET_KEY
              value: "food-delivery-super-secret-key-change-in-prod"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "60"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
